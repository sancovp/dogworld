name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # Install the FOUNDATION (template = owl22python + the mixins; circuits = UCO) so the suite
      # exercises them. The stdlib core still works without these; the gated tests self-skip if absent.
      - name: Install the template + circuits extras
        run: pip install -e '.[template,circuits]'
      - name: Run the test suite (offline, no API, no neo4j)
        run: python tests/run_all.py
      - name: Smoke-run the offline examples
        run: |
          python examples/owl_dog.py
          python examples/calibration_bench.py
          python examples/catalysis_demo.py
          python examples/sdt_evolve.py
          python examples/template_agent_demo.py
          python examples/circuit_demo.py
          python examples/macro_demo.py
          python examples/hierarchy_demo.py
          python examples/curate_demo.py
          python examples/repair_demo.py
